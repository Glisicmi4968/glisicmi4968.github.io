name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          ABE44E: ${{ secrets.ABE44E }}
          B2BBDB: ${{ secrets.B2BBDB }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('ABE44E', '')
          bm = os.environ.get('B2BBDB', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 74eda3e95c9d5b17ad7f18e049784dae7c0f65184a93 -->', gm)
              s2 = s2.replace('<!-- e5994d1a50bd13cb5baf58c32905ff714a -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
